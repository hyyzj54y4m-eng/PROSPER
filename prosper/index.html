<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prosper">
<meta name="theme-color" content="#0d0918">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Prosper</title>
<style>
/* ============================================================
   INTENTIONAL  —  budgeting app  (Phase 1: Foundation)
   One app, two skins. Only the color + welcome name change.
   ============================================================ */

:root{
  --radius: 22px;
  --radius-sm: 16px;
  --ease: cubic-bezier(.2,.8,.2,1);
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
}

/* ---------- PURPLE THEME (Jeffrey) ---------- */
[data-theme="purple"]{
  --bg0:#0d0918; --bg1:#160e2b; --bg2:#1d1138;
  --accent:#a855f7; --accent-2:#c084fc; --accent-3:#7c3aed;
  --glow: rgba(168,85,247,.45);
  --card: rgba(255,255,255,.045);
  --card-brd: rgba(168,85,247,.18);
  --txt:#f3effb; --txt-dim:#b6abd4; --txt-faint:#776c93;
  --good:#4ade80; --bad:#fb7185; --warn:#fbbf24;
}
/* ---------- EMERALD + GOLD THEME (Mom) ---------- */
[data-theme="emerald"]{
  --bg0:#06120d; --bg1:#0a1d16; --bg2:#0e271d;
  --accent:#10b981; --accent-2:#34d399; --accent-3:#0e9e74;
  --glow: rgba(16,185,129,.42);
  --card: rgba(255,255,255,.045);
  --card-brd: rgba(245,201,123,.20);
  --txt:#eefaf4; --txt-dim:#cfe6dc; --txt-faint:#9fc2b4;
  --gold:#f5c97b;
  --good:#5eead4; --bad:#fb7185; --warn:#f5c97b;
}
/* ---------- RED THEME (Eduardo) ---------- */
[data-theme="red"]{
  --bg0:#140807; --bg1:#200d0b; --bg2:#2b120e;
  --accent:#ef4444; --accent-2:#f87171; --accent-3:#b91c1c;
  --glow: rgba(239,68,68,.45);
  --card: rgba(255,255,255,.045);
  --card-brd: rgba(239,68,68,.20);
  --txt:#fcefed; --txt-dim:#d8b2ac; --txt-faint:#9c726c;
  --good:#4ade80; --bad:#fca5a5; --warn:#fbbf24;
}
/* ---------- PINK THEME (Yen-kao) ---------- */
[data-theme="pink"]{
  --bg0:#16070f; --bg1:#230b18; --bg2:#2f0f20;
  --accent:#ec4899; --accent-2:#f472b6; --accent-3:#be185d;
  --glow: rgba(236,72,153,.45);
  --card: rgba(255,255,255,.045);
  --card-brd: rgba(236,72,153,.20);
  --txt:#fdeef6; --txt-dim:#dbafc7; --txt-faint:#9e7089;
  --good:#5eead4; --bad:#fb7185; --warn:#fbbf24;
}
/* ---------- NEUTRAL (profile select screen) ---------- */
[data-theme="neutral"]{
  --bg0:#0b0814; --bg1:#141021; --bg2:#1b1530;
  --accent:#c7cbe0; --accent-2:#e4e7f2; --accent-3:#8b90a8;
  --glow: rgba(190,194,220,.35);
  --card: rgba(255,255,255,.05);
  --card-brd: rgba(255,255,255,.14);
  --txt:#f2f0f7; --txt-dim:#b8b5c6; --txt-faint:#807d90;
  --good:#5eead4; --bad:#fb7185; --warn:#fbbf24;
}

*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:var(--font);
  background:var(--bg0);
  color:#f3eff9;
  overflow:hidden;
  position:fixed; inset:0;
}

/* phone frame so it looks app-like on desktop preview too */
#app{
  position:relative;
  color:var(--txt);
  width:100%; max-width:100%; margin:0 auto; height:100%;
  background:
    radial-gradient(120% 80% at 50% -10%, var(--bg2), transparent 60%),
    radial-gradient(90% 60% at 100% 110%, var(--bg1), transparent 55%),
    var(--bg0);
  overflow:hidden;
  display:flex; flex-direction:column;
}

/* ================= WELCOME SCREEN ================= */
#welcome{
  position:absolute; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:26px; padding:40px;
  background:
    radial-gradient(80% 50% at 50% 30%, var(--bg2), transparent 70%),
    var(--bg0);
  transition:opacity .8s var(--ease), transform .8s var(--ease);
}
#welcome.hide{opacity:0; transform:scale(1.04); pointer-events:none;}

.orb{
  width:96px;height:96px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--accent-2), var(--accent-3));
  box-shadow:0 0 60px 6px var(--glow), inset 0 0 24px rgba(255,255,255,.25);
  animation:float 4s var(--ease) infinite, pulse 2.4s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(-6px)}50%{transform:translateY(6px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 60px 6px var(--glow), inset 0 0 24px rgba(255,255,255,.25)}50%{box-shadow:0 0 90px 14px var(--glow), inset 0 0 30px rgba(255,255,255,.35)}}

.welcome-text{
  font-size:30px; font-weight:650; letter-spacing:-.5px;
  min-height:42px; text-align:center; color:#ffffff;
}
.welcome-text .name{
  color:#ffffff; font-weight:800;
  text-shadow:0 0 22px var(--glow), 0 0 8px rgba(255,255,255,.45);
}
.caret{
  display:inline-block; width:3px; height:30px; margin-left:2px;
  background:var(--accent-2); vertical-align:-5px; border-radius:2px;
  animation:blink 1s step-end infinite;
}
@keyframes blink{50%{opacity:0}}
.tagline{color:var(--txt-faint); font-size:14px; letter-spacing:.3px; opacity:0; transition:opacity .6s ease .2s;}
.tagline.show{opacity:1;}
.enter-btn{
  margin-top:6px; opacity:0; transform:translateY(8px);
  transition:opacity .5s ease, transform .5s var(--ease);
  padding:14px 34px; border-radius:30px; border:none; cursor:pointer;
  font-family:var(--font); font-size:15px; font-weight:650; color:#fff;
  background:linear-gradient(90deg,var(--accent-3),var(--accent));
  box-shadow:0 10px 30px -8px var(--glow);
}
.enter-btn.show{opacity:1; transform:translateY(0);}
.enter-btn:active{transform:scale(.96);}

/* ================= MAIN APP ================= */
#main{flex:1; display:flex; flex-direction:column; min-height:0; opacity:0; transition:opacity .7s ease .15s;}
#main.show{opacity:1;}

header.topbar{
  padding:58px 22px 10px; display:flex; align-items:center; justify-content:space-between;
}
.hello{font-size:13px; color:var(--txt-faint);}
.hello b{display:block; font-size:21px; color:var(--txt); font-weight:700; letter-spacing:-.4px; margin-top:2px;}
.avatar{
  width:42px;height:42px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--accent-2), var(--accent-3));
  box-shadow:0 0 18px -2px var(--glow);
  display:grid; place-items:center; font-weight:800; color:#fff; font-size:16px;
}

.scroll{flex:1; overflow-y:auto; padding:8px 18px 110px; -webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}

.section-label{font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:var(--txt-faint); margin:22px 6px 12px; font-weight:600;}

.card{
  background:var(--card);
  border:1px solid var(--card-brd);
  border-radius:var(--radius);
  padding:20px; margin-bottom:14px;
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
}

/* hero balance card */
.hero{
  background:linear-gradient(150deg, color-mix(in srgb, var(--accent-3) 55%, transparent), color-mix(in srgb, var(--accent) 18%, transparent));
  border:1px solid var(--card-brd);
  position:relative; overflow:hidden;
}
.hero::after{content:""; position:absolute; width:160px;height:160px; right:-40px; top:-50px;
  background:radial-gradient(circle, var(--glow), transparent 70%); }
.hero .lbl{font-size:13px; color:var(--txt-dim); letter-spacing:.3px;}
.hero .amt{font-size:38px; font-weight:800; letter-spacing:-1px; margin:6px 0 2px; color:#ffffff;}
.hero .sub{font-size:13px; color:var(--txt-dim);}
.hero .sub .up{color:var(--good); font-weight:600;}

.mini-row{display:flex; gap:12px; margin-top:4px;}
.mini{flex:1;}
.mini .t{font-size:12px;color:var(--txt-faint); margin-bottom:6px;}
.mini .v{font-size:18px;font-weight:700;color:#ffffff;}
.mini .v.in{color:var(--good);}
.mini .v.out{color:var(--bad);}

/* placeholder feature cards */
.feature{display:flex; align-items:center; gap:14px;}
.feature .ic{
  width:46px;height:46px;border-radius:14px; flex:none;
  display:grid;place-items:center; font-size:22px;
  background:color-mix(in srgb, var(--accent) 16%, transparent);
  border:1px solid var(--card-brd);
}
.feature .body{flex:1; min-width:0;}
.feature .body h4{font-size:15.5px; font-weight:680; letter-spacing:-.2px;}
.feature .body p{font-size:12.5px; color:var(--txt-faint); margin-top:3px; line-height:1.4;}
.chip{font-size:10.5px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
  padding:5px 9px; border-radius:20px; white-space:nowrap;
  color:var(--accent-2); background:color-mix(in srgb, var(--accent) 14%, transparent);}

/* ================= BOTTOM NAV ================= */
nav.tabbar{
  position:absolute; left:50%; transform:translateX(-50%); bottom:calc(16px + env(safe-area-inset-bottom));
  width:calc(100% - 36px); max-width:394px;
  display:flex; justify-content:space-around; align-items:center;
  padding:11px 4px;
  background:color-mix(in srgb, var(--bg2) 80%, transparent);
  border:1px solid var(--card-brd);
  border-radius:26px;
  backdrop-filter:blur(20px) saturate(140%); -webkit-backdrop-filter:blur(20px) saturate(140%);
  box-shadow:0 16px 40px -12px rgba(0,0,0,.6);
}
.tab{
  background:none;border:none; cursor:pointer; font-family:var(--font);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  color:var(--txt-faint); font-size:9.5px; font-weight:600; padding:4px 4px; border-radius:14px;
  transition:color .25s;
}
.tab .tab-lbl{white-space:nowrap;}
.tab svg{width:21px;height:21px; stroke:currentColor; fill:none; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round;}
.tab.active{color:var(--accent-2);}
.tab.active svg{filter:drop-shadow(0 0 6px var(--glow));}

/* ================= PREVIEW SWITCHER (review only) ================= */
#previewbar{
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  z-index:60; display:flex; gap:6px; padding:8px 10px;
  background:rgba(0,0,0,.45); border-radius:0 0 16px 16px; backdrop-filter:blur(10px);
  font-size:11px;
}
#previewbar button{
  font-family:var(--font); font-size:11px; font-weight:600; cursor:pointer;
  border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.06); color:#fff;
  padding:6px 12px; border-radius:20px;
}
#previewbar button.on{background:#fff; color:#111; border-color:#fff;}
.preview-note{position:absolute; top:46px; left:0;right:0; text-align:center; font-size:10px; color:rgba(255,255,255,.4); z-index:60;}

/* ===== PHASE 2: money tracking ===== */
.seg{display:flex; background:var(--card); border:1px solid var(--card-brd); border-radius:16px; padding:4px; margin:4px 0 14px;}
.seg button{flex:1; border:none; background:none; color:var(--txt-dim); font-family:var(--font); font-weight:650; font-size:13.5px; padding:9px; border-radius:12px; cursor:pointer; transition:.2s;}
.seg button.on{background:linear-gradient(90deg,var(--accent-3),var(--accent)); color:#fff; box-shadow:0 6px 16px -6px var(--glow);}

.card.list{padding:6px 8px;}
.day-label{font-size:12px; color:var(--txt-faint); font-weight:650; margin:16px 6px 8px; letter-spacing:.4px;}
.tx{display:flex; align-items:center; gap:12px; padding:11px 10px; border-radius:14px; cursor:pointer; transition:background .15s;}
.tx:active{background:rgba(255,255,255,.06);}
.tx + .tx{border-top:1px solid rgba(255,255,255,.05);}
.tx-ic{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;font-size:18px; background:color-mix(in srgb,var(--accent) 14%,transparent);}
.tx-body{flex:1; min-width:0;}
.tx-cat{font-size:14.5px;font-weight:600;}
.tx-note{font-size:12px;color:var(--txt-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.tx-amt{font-weight:750; font-size:15px;}
.tx-amt.in{color:var(--good);}
.tx-amt.out{color:var(--txt);}

.empty{text-align:center; padding:50px 20px; color:var(--txt-faint);}
.empty-ic{font-size:34px; margin-bottom:10px; opacity:.75;}
.empty-t{font-size:15.5px; font-weight:680; color:var(--txt-dim);}
.empty-s{font-size:13px; margin-top:5px; line-height:1.4;}

.fab{position:absolute; right:24px; bottom:96px; z-index:30;
  width:58px;height:58px;border-radius:50%; border:none; cursor:pointer;
  font-size:30px; font-weight:300; color:#fff; line-height:1;
  background:linear-gradient(145deg,var(--accent-2),var(--accent-3));
  box-shadow:0 12px 30px -6px var(--glow), inset 0 1px 1px rgba(255,255,255,.3);
  transition:transform .2s var(--ease);}
.fab:active{transform:scale(.9) rotate(90deg);}

.sheet-wrap{position:absolute; inset:0; z-index:70; display:flex; align-items:flex-end;
  background:rgba(0,0,0,.55); opacity:0; pointer-events:none; transition:opacity .3s;}
.sheet-wrap.open{opacity:1; pointer-events:auto;}
.sheet{width:100%; max-height:92%; overflow-y:auto; background:linear-gradient(180deg,var(--bg2),var(--bg1));
  border:1px solid var(--card-brd); border-bottom:none; border-radius:26px 26px 0 0; padding:10px 20px 30px;
  transform:translateY(100%); transition:transform .35s var(--ease);}
.sheet-wrap.open .sheet{transform:translateY(0);}
.sheet::-webkit-scrollbar{display:none;}
.sheet-grab{width:42px;height:5px;border-radius:3px;background:var(--txt-faint);opacity:.4;margin:4px auto 14px;}
.sheet-title{display:flex;align-items:center;justify-content:space-between;font-size:18px;font-weight:720;margin-bottom:16px;}
.sheet-close{background:rgba(255,255,255,.08);border:none;color:var(--txt-dim);width:30px;height:30px;border-radius:50%;font-size:13px;cursor:pointer;}
.field-lbl{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:1px;color:var(--txt-faint);font-weight:650;margin:16px 4px 8px;}
.amt-field{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--card-brd);border-radius:16px;padding:12px 18px;}
.amt-field span{font-size:26px;font-weight:700;color:var(--txt-dim);}
.amt-field input{flex:1;background:none;border:none;outline:none;color:#ffffff;font-family:var(--font);font-size:30px;font-weight:750;width:100%;}
.amt-field span{color:#ffffff;}
.amt-field input::placeholder{color:rgba(255,255,255,.4);}
.amt-field input::-webkit-outer-spin-button,.amt-field input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.amt-field.shake{animation:shk .4s;}
@keyframes shk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.text-field{width:100%;background:var(--card);border:1px solid var(--card-brd);border-radius:14px;padding:13px 16px;color:#ffffff;font-family:var(--font);font-size:15px;outline:none;}
.text-field::placeholder{color:rgba(255,255,255,.4);}
.text-field::-webkit-calendar-picker-indicator{filter:invert(.7);}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cat{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;border-radius:14px;cursor:pointer;
  background:var(--card);border:1px solid var(--card-brd);color:var(--txt-dim);font-family:var(--font);font-size:11.5px;font-weight:600;transition:.18s;}
.cat span{font-size:20px;}
.cat.on{background:color-mix(in srgb,var(--accent) 22%,transparent);border-color:var(--accent);color:var(--txt);box-shadow:0 6px 16px -8px var(--glow);}
.save-btn{width:100%;margin-top:22px;padding:16px;border:none;border-radius:18px;cursor:pointer;
  font-family:var(--font);font-size:16px;font-weight:720;color:#fff;
  background:linear-gradient(90deg,var(--accent-3),var(--accent));box-shadow:0 10px 26px -8px var(--glow);}
.save-btn:active{transform:scale(.98);}

/* ===== PROFILE SELECT + PASSCODE ===== */
#profile,#passcode{position:absolute; inset:0; z-index:80; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:40px 30px; gap:22px;
  background:radial-gradient(80% 50% at 50% 24%, #1a1426, transparent 70%), #0b0814;
  opacity:0; pointer-events:none; transform:scale(1.02);
  transition:opacity .5s var(--ease), transform .5s var(--ease);}
#profile.on,#passcode.on{opacity:1; pointer-events:auto; transform:scale(1);}

.pf-head{text-align:center; display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:8px;}
.pf-orb{width:68px;height:68px;border-radius:50%;
  background:conic-gradient(from 0deg,#10b981,#a855f7,#ef4444,#ec4899,#34d399,#10b981);
  box-shadow:0 0 90px 16px rgba(150,100,230,.7), 0 0 36px 6px rgba(80,220,180,.45), inset 0 0 18px rgba(255,255,255,.35);
  animation:float 4s var(--ease) infinite, hueShift 9s linear infinite;}
@keyframes hueShift{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(360deg);}}
.pf-title{font-size:34px;font-weight:800;letter-spacing:-.5px;color:#fff;min-height:46px;
  text-shadow:0 0 18px rgba(255,255,255,.15);}
.pf-title.word-in{animation:wordIn .55s var(--ease) both;}
.pf-title.word-out{animation:wordOut .35s ease-in both;}
.pf-title.glow{animation:pulseGlow 2.6s ease-in-out infinite;}
@keyframes wordIn{
  0%{opacity:0; filter:blur(16px); transform:translateY(16px) scale(.97);}
  100%{opacity:1; filter:blur(0); transform:translateY(0) scale(1);}
}
@keyframes wordOut{
  0%{opacity:1; filter:blur(0); transform:translateY(0);}
  100%{opacity:0; filter:blur(14px); transform:translateY(-14px);}
}
@keyframes pulseGlow{
  0%,100%{text-shadow:0 0 16px var(--glow), 0 0 5px rgba(255,255,255,.35);}
  50%{text-shadow:0 0 38px var(--glow), 0 0 16px rgba(255,255,255,.7);}
}
.pf-sub{font-size:14px;color:#8a8099;transition:opacity .6s ease;}
.pf-cards{display:flex; flex-direction:column; gap:14px; width:100%; max-width:300px; transition:opacity .6s ease;}
.pf-card{display:flex; align-items:center; gap:16px; padding:18px 20px; border-radius:20px; cursor:pointer;
  background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.1); color:#fff; font-family:var(--font);
  transition:transform .18s var(--ease), background .2s;}
.pf-card:active{transform:scale(.97);}
.pf-card[data-theme="emerald"]{border-color:rgba(16,185,129,.45);}
.pf-card[data-theme="purple"]{border-color:rgba(168,85,247,.45);}
.pf-card[data-theme="red"]{border-color:rgba(239,68,68,.45);}
.pf-card[data-theme="pink"]{border-color:rgba(236,72,153,.45);}
.pf-av{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:19px;color:#fff;flex:none;}
.pf-card[data-theme="emerald"] .pf-av{background:radial-gradient(circle at 35% 30%,#34d399,#0e9e74);box-shadow:0 0 22px -2px rgba(16,185,129,.6);}
.pf-card[data-theme="purple"] .pf-av{background:radial-gradient(circle at 35% 30%,#c084fc,#7c3aed);box-shadow:0 0 22px -2px rgba(168,85,247,.6);}
.pf-card[data-theme="red"] .pf-av{background:radial-gradient(circle at 35% 30%,#f87171,#b91c1c);box-shadow:0 0 22px -2px rgba(239,68,68,.6);}
.pf-card[data-theme="pink"] .pf-av{background:radial-gradient(circle at 35% 30%,#f472b6,#be185d);box-shadow:0 0 22px -2px rgba(236,72,153,.6);}
.pf-name{flex:1;text-align:left;font-size:18px;font-weight:700;}
.pf-lock{font-size:16px;color:#9a90aa;}

.pc-back{position:absolute;top:54px;left:24px;background:none;border:none;color:var(--txt-dim);font-family:var(--font);font-size:15px;cursor:pointer;}
.pc-av{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:24px;color:#fff;
  background:radial-gradient(circle at 35% 30%,var(--accent-2),var(--accent-3));box-shadow:0 0 30px -2px var(--glow);}
.pc-name{font-size:20px;font-weight:700;color:#fff;}
.pc-prompt{font-size:14px;color:var(--txt-dim);margin-top:-6px;}
.pc-dots{display:flex;gap:14px;margin:4px 0 8px;}
.pc-dots.shk{animation:shk .4s;}
.pc-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--accent);transition:.15s;}
.pc-dot.fill{background:var(--accent);box-shadow:0 0 12px var(--glow);}
.pc-pad{display:grid;grid-template-columns:repeat(3,72px);gap:16px;justify-content:center;}
.pc-pad>div{width:72px;height:72px;}
.pc-key{width:72px;height:72px;border-radius:50%;border:1px solid var(--card-brd);cursor:pointer;
  background:var(--card);color:#fff;font-family:var(--font);font-size:26px;font-weight:600;transition:.12s;}
.pc-key:active{background:color-mix(in srgb,var(--accent) 30%,transparent);transform:scale(.93);}

/* ===== language toggle ===== */
.top-right{display:flex;align-items:center;gap:8px;}
.lang-toggle{display:flex;align-items:center;background:var(--card);border:1px solid var(--card-brd);border-radius:20px;padding:3px;cursor:pointer;font-family:var(--font);flex:none;}
.lang-toggle span{font-size:10px;font-weight:750;padding:4px 8px;border-radius:16px;color:var(--txt-faint);transition:.2s;line-height:1;white-space:nowrap;}
.lang-toggle span.on{background:linear-gradient(90deg,var(--accent-3),var(--accent));color:#fff;}
.pf-lang{position:absolute;top:18px;left:50%;transform:translateX(-50%);z-index:6;}
.pf-head{margin-top:26px;}
.pf-lang span{font-size:12.5px;padding:6px 15px;}

.period-nav{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 14px;}
.pn-arrow{width:38px;height:38px;border-radius:12px;border:1px solid var(--card-brd);background:var(--card);color:var(--txt);font-size:20px;cursor:pointer;font-family:var(--font);line-height:1;}
.pn-arrow:disabled{opacity:.3;cursor:default;}
.pn-arrow:active:not(:disabled){background:color-mix(in srgb,var(--accent) 25%,transparent);}
.pn-label{font-size:15px;font-weight:700;color:var(--txt);}

.add-debt-btn{width:100%;margin-top:8px;padding:14px;border:1px dashed var(--card-brd);border-radius:16px;background:transparent;color:var(--accent-2);font-family:var(--font);font-size:14px;font-weight:650;cursor:pointer;}
.add-debt-btn:active{background:color-mix(in srgb,var(--accent) 12%,transparent);}
.debt-del{background:none;border:none;color:var(--txt-faint);font-size:15px;cursor:pointer;padding:0 2px;margin-left:8px;}
.compass-hero{background:linear-gradient(150deg, color-mix(in srgb, var(--accent-3) 60%, transparent), color-mix(in srgb, var(--accent) 16%, transparent));}

.bud-list{padding:8px 14px;}
.bud-row{padding:13px 4px;cursor:pointer;}
.bud-row+.bud-row{border-top:1px solid rgba(255,255,255,.05);}
.bud-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;gap:10px;}
.bud-name{font-size:14.5px;font-weight:600;}
.bud-amt{font-size:13px;color:var(--txt-dim);font-weight:650;white-space:nowrap;}
.bud-amt.over{color:var(--bad);}
.bud-bar{height:8px;border-radius:6px;background:rgba(255,255,255,.09);overflow:hidden;}
.bud-fill{height:100%;border-radius:6px;transition:width .45s var(--ease);}
.bud-goal{cursor:pointer;}

.goal-card{padding:18px;}
.goal-top{display:flex;align-items:center;gap:13px;margin-bottom:13px;}
.goal-ic{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:22px;background:color-mix(in srgb,var(--accent) 16%,transparent);border:1px solid var(--card-brd);flex:none;}
.goal-info{flex:1;min-width:0;}
.goal-name{font-size:16px;font-weight:700;}
.goal-sub{font-size:13px;color:var(--txt-dim);margin-top:2px;}
.goal-del{background:none;border:none;color:var(--txt-faint);font-size:15px;cursor:pointer;padding:0 2px;}
.goal-foot{display:flex;justify-content:space-between;align-items:center;margin-top:11px;}
.goal-pct{font-size:13px;font-weight:700;color:var(--accent-2);}
.goal-add{background:color-mix(in srgb,var(--accent) 18%,transparent);border:1px solid var(--card-brd);color:var(--txt);font-family:var(--font);font-size:13px;font-weight:650;padding:8px 16px;border-radius:20px;cursor:pointer;}
.goal-add:active{transform:scale(.96);}

.debt-hero{background:linear-gradient(150deg, color-mix(in srgb, var(--bad) 38%, transparent), color-mix(in srgb, var(--accent) 14%, transparent));}
.invest-hero{background:linear-gradient(150deg, color-mix(in srgb, var(--good) 32%, transparent), color-mix(in srgb, var(--accent) 14%, transparent));}
.note-card{cursor:pointer;}
.note-preview{font-size:14.5px;line-height:1.5;color:var(--txt);white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.note-date{font-size:11.5px;color:var(--txt-faint);margin-top:8px;}
.note-area{width:100%;min-height:230px;resize:none;background:var(--card);border:1px solid var(--card-brd);border-radius:14px;padding:14px 16px;color:#ffffff;font-family:var(--font);font-size:15px;line-height:1.55;outline:none;}
.note-area::placeholder{color:rgba(255,255,255,.4);}
.tip{font-size:12.5px;color:var(--txt-dim);line-height:1.5;padding:13px 15px;margin-top:8px;background:var(--card);border:1px solid var(--card-brd);border-radius:14px;}
[data-go]{cursor:pointer;}
[data-go]:active{transform:scale(.99);}
</style>
</head>
<body>

<script>
/* ============================================================
   FOUNDATION LOGIC
   - profile config (name + theme)  ← only thing that differs
   - typing welcome animation
   - on-device data store (localStorage)  ← real, for later phases
   - navigation scaffold
   ============================================================ */

// --- PROFILES: the ONLY difference between the two apps ---
const PROFILES = {
  jeff: { name: "Jeffrey", theme: "emerald", key: "intentional_jeffrey", code: "8888" },
  mom:  { name: "Yanderi", theme: "purple",  key: "intentional_yanderi", code: null },
  dad:  { name: "Eduardo", theme: "red",     key: "intentional_eduardo", code: null },
  gf:   { name: "Yen-kao", theme: "pink",    key: "intentional_yenkao",  code: null }
};
let current = "jeff";

// --- DATA STORE (persists on the phone) ---
function blankStore(){
  return { transactions:[], debts:[], goals:[], budgets:{}, customCats:[], investments:[], incomeStreams:[], recurring:[], notes:[], settings:{} };
}
function loadStore(profile){
  try{ return JSON.parse(localStorage.getItem(PROFILES[profile].key)) || blankStore(); }
  catch(e){ return blankStore(); }
}
function saveStore(profile, data){
  try{ localStorage.setItem(PROFILES[profile].key, JSON.stringify(data)); }catch(e){}
}
let store = loadStore(current);

// --- APPLY A PROFILE (theme + names) ---
const appEl = document.getElementById("app");
function applyProfile(p){
  current = p;
  const prof = PROFILES[p];
  appEl.setAttribute("data-theme", prof.theme);
  document.getElementById("userName").textContent = prof.name;
  document.getElementById("userInitial").textContent = prof.name.charAt(0).toUpperCase();
  store = loadStore(p);
  runWelcome(prof.name);
}

// --- TYPING WELCOME ANIMATION ---
const typedEl   = document.getElementById("typed");
const taglineEl = document.getElementById("tagline");
const enterBtn  = document.getElementById("enterBtn");
const welcomeEl = document.getElementById("welcome");
const mainEl    = document.getElementById("main");
let   typeTimer = null;

function typeString(name, cb){
  const pre = t('welcome') + " ";   // localized "Welcome" / "Bienvenido"
  const post = "....";          // trailing dots AFTER the name
  const full = pre + name + post;
  const preLen = pre.length;
  const nameLen = pre.length + name.length;
  typedEl.innerHTML = "";
  let i = 0;
  (function step(){
    if(i <= full.length){
      const shown = full.slice(0, i);
      let html;
      if(shown.length <= preLen){
        html = shown;
      } else if(shown.length <= nameLen){
        html = pre + '<span class="name">' + shown.slice(preLen) + '</span>';
      } else {
        html = pre + '<span class="name">' + name + '</span>' + shown.slice(nameLen);
      }
      typedEl.innerHTML = html;
      i++;
      typeTimer = setTimeout(step, shown.length < preLen ? 55 : 95);
    } else if(cb){ cb(); }
  })();
}

function runWelcome(name){
  clearTimeout(typeTimer);
  welcomeEl.classList.remove("hide");
  mainEl.classList.remove("show");
  taglineEl.classList.remove("show");
  enterBtn.classList.remove("show");
  typeString(name, ()=>{
    setTimeout(()=> taglineEl.classList.add("show"), 250);
    setTimeout(()=> enterBtn.classList.add("show"), 600);
  });
}

function enterApp(){
  welcomeEl.classList.add("hide");
  processRecurring();
  setTimeout(()=>{ mainEl.classList.add("show"); route(activeTab); }, 250);
}
enterBtn.addEventListener("click", enterApp);

/* ============================================================
   PHASE 2  —  money in / out
   ============================================================ */
let activeTab = "home";
let moneyView = "month";              // 'month' | 'week'
let moneyTab = "activity";            // Money hub: 'activity' | 'recurring'
let periodOffset = 0;                 // 0 = current; negative = past periods
let compassDebtOn = false;            // Compass: net-worth view includes debt when true
let compassView = "overview";         // Compass hub: 'overview' | 'debt' | 'invest'
let budgetView = "month";             // Budget tab: 'month' | 'weekly'
let budgetTarget = null;              // what the budget sheet is editing
const screenEl = document.getElementById("screen");

const CATS = {
  in:[
    {id:'business', label:'Business', es:'Negocio',      emoji:'💼'},
    {id:'paycheck', label:'Paycheck', es:'Salario',      emoji:'🪙'},
    {id:'bonus',    label:'Bonus',    es:'Bono',         emoji:'🎉'},
    {id:'side',     label:'Side hustle', es:'Trabajo extra', emoji:'⚡'},
    {id:'gift',     label:'Gift',     es:'Regalo',       emoji:'🎁'},
    {id:'other_in', label:'Other',    es:'Otro',         emoji:'➕'}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmt(n){ return '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function sfmt(n){ return (n<0?'-':'')+fmt(n); }
function todayStr(){ const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function within(view, dateStr){
  const d=new Date(dateStr+'T00:00:00'); const r=new Date();
  if(view==='month') return d.getFullYear()===r.getFullYear() && d.getMonth()===r.getMonth();
  const s=new Date(r); s.setHours(0,0,0,0); s.setDate(r.getDate()-r.getDay());
  const e=new Date(s); e.setDate(s.getDate()+7);
  return d>=s && d<e;
}
function totalsFor(view){
  let inc=0, exp=0;
  store.transactions.forEach(t=>{ if(within(view,t.date)){ t.type==='in' ? inc+=t.amount : exp+=t.amount; } });
  return { inc, exp, net: inc-exp };
}
function inRange(dateStr,start,end){ const d=new Date(dateStr+'T00:00:00'); return d>=start && d<end; }
function totalsRange(start,end){
  let inc=0,exp=0;
  store.transactions.forEach(tx=>{ if(inRange(tx.date,start,end)){ tx.type==='in'?inc+=tx.amount:exp+=tx.amount; } });
  return {inc,exp,net:inc-exp};
}
function periodRange(view, offset){
  const now=new Date();
  if(view==='week'){
    const s=new Date(now); s.setHours(0,0,0,0); s.setDate(now.getDate()-now.getDay()+offset*7);
    const e=new Date(s); e.setDate(s.getDate()+7);
    const o={month:'short',day:'numeric'}; const eo=new Date(e); eo.setDate(e.getDate()-1);
    const label=cap(s.toLocaleDateString(loc(),o))+' – '+cap(eo.toLocaleDateString(loc(),o));
    return {start:s,end:e,label};
  }
  const d=new Date(now.getFullYear(), now.getMonth()+offset, 1);
  const start=new Date(d.getFullYear(), d.getMonth(), 1);
  const end=new Date(d.getFullYear(), d.getMonth()+1, 1);
  return {start,end,label:cap(d.toLocaleDateString(loc(),{month:'long', year:'numeric'}))};
}
function prettyDate(str){
  const d=new Date(str+'T00:00:00'); const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((today-d)/86400000);
  if(diff===0) return t('today');
  if(diff===1) return t('yesterday');
  return cap(d.toLocaleDateString(loc(),{weekday:'short',month:'short',day:'numeric'}));
}

function netWorthCalc(){ const liquid=liquidTotal(), invested=investTotal(), debt=debtTotal(); return {liquid,invested,debt,net:liquid+invested-debt}; }
function simulatePayoff(debts, pay){
  let bal=debts.map(d=>({b:+d.balance||0, r:(+d.rate||0)/100/12})).filter(x=>x.b>0);
  bal.sort((a,b)=>b.r-a.r);
  let interest=0, months=0;
  while(bal.some(x=>x.b>0.005) && months<1201){
    months++;
    bal.forEach(x=>{ if(x.b>0){ const it=x.b*x.r; x.b+=it; interest+=it; } });
    let pool=pay;
    for(const x of bal){ if(pool<=0) break; if(x.b>0){ const p=Math.min(pool,x.b); x.b-=p; pool-=p; } }
  }
  if(months>=1201) return null;
  const d=new Date(); d.setMonth(d.getMonth()+months);
  return {months, interest:Math.round(interest*100)/100, label:cap(d.toLocaleDateString(loc(),{month:'short',year:'numeric'}))};
}

}

/* ----- Budgets & targets ----- */
function spentInRange(catId,start,end){
  let s=0;
  store.transactions.forEach(x=>{ if(x.type==='out' && x.category===catId && inRange(x.date,start,end)) s+=x.amount; });
  return s;
}
function renderBudget(){
  const weekly = budgetView==='weekly';
  const range = periodRange(weekly?'week':'month', 0);
  const factor = weekly ? (7/30.44) : 1;     // weekly slice of a monthly budget
  const cats = (store.budgets && store.budgets.cats) || {};
  const outCats = allCats('out');
  let totalBudget=0, totalSpent=0;
  outCats.forEach(c=>{ totalBudget += (cats[c.id]||0)*factor; totalSpent += spentInRange(c.id, range.start, range.end); });
  const remaining = totalBudget-totalSpent;
  const rows = outCats.map(c=>{
    const b=(cats[c.id]||0)*factor;
    const sp=spentInRange(c.id, range.start, range.end);
    const pct=b>0 ? Math.min(100, sp/b*100) : 0;
    const over=b>0 && sp>b;
    const col=over?'var(--bad)':(pct>80?'var(--warn)':'var(--good)');
    const right=b>0 ? `${fmt(sp)} / ${fmt(b)}` : `${fmt(sp)} · ${t('setBudget')}`;
    return `<div class="bud-row" data-cat="${c.id}">
      <div class="bud-head"><span class="bud-name">${c.emoji} ${catLabel(c)}</span><span class="bud-amt ${over?'over':''}">${right}</span></div>
      <div class="bud-bar"><div class="bud-fill" style="width:${b>0?pct:0}%;background:${col}"></div></div>
    </div>`;
  }).join('');
  const goal=(store.budgets && store.budgets.leftoverGoal) || 0;
  const m=periodRange('month',0); const mt=totalsRange(m.start,m.end);
  const goalPct=goal>0 ? Math.min(100, Math.max(0, mt.net/goal*100)) : 0;
  const streams=store.incomeStreams||[];
  const expTotal=streams.reduce((s,x)=>s+(+x.amount||0),0);
  const streamRows=streams.map(s=>`<div class="tx"><div class="tx-ic">💰</div><div class="tx-body"><div class="tx-cat">${escapeHtml(s.name)}</div></div><div class="tx-amt in">${fmt(s.amount)}</div><button class="inc-del" data-id="${s.id}">✕</button></div>`).join('');
  screenEl.innerHTML=`
    <div class="seg view-seg">
      <button data-bview="month" class="${!weekly?'on':''}">${t('monthly')}</button>
      <button data-bview="weekly" class="${weekly?'on':''}">${t('weekly')}</button>
    </div>
    <div class="section-label">${t('expectedIncome')}${expTotal>0?` · ${fmt(expTotal)}`:''}</div>
    ${streams.length?`<div class="card list">${streamRows}</div>`:''}
    <button class="add-debt-btn" id="addIncBtn">+ ${t('addIncomeSrc')}</button>
    <div class="card hero compass-hero">
      <div class="lbl">${weekly?t('weeklyBudget'):t('monthlyBudget')}</div>
      <div class="amt">${sfmt(remaining)}</div>
      <div class="sub">${fmt(totalSpent)} ${t('spentWord')} · ${fmt(totalBudget)} ${t('budgetedWord')}</div>
    </div>
    <div class="section-label">${t('categories')}</div>
    <div class="card bud-list">${rows}</div>
    <button class="add-debt-btn" id="addCatBtn">+ ${t('addCategory')}</button>
    <div class="section-label">${t('leftoverTarget')}</div>
    <div class="card bud-goal" id="goalCard">
      <div class="bud-head"><span class="bud-name">🎯 ${t('leftoverThisMonth')}</span><span class="bud-amt">${goal>0?`${sfmt(mt.net)} / ${fmt(goal)}`:t('setTarget')}</span></div>
      ${goal>0?`<div class="bud-bar"><div class="bud-fill" style="width:${goalPct}%;background:var(--accent)"></div></div>`:''}
    </div>
  `;
  screenEl.querySelectorAll(".view-seg button").forEach(b=> b.addEventListener("click",()=>{ if(budgetView!==b.dataset.bview){ budgetView=b.dataset.bview; renderBudget(); } }));
  screenEl.querySelectorAll(".bud-row").forEach(r=> r.addEventListener("click",()=> openBudgetSheet('cat', r.dataset.cat)));
  document.getElementById("goalCard").addEventListener("click",()=> openBudgetSheet('leftover'));
  document.getElementById("addCatBtn").addEventListener("click", openCatSheet);
  document.getElementById("addIncBtn").addEventListener("click", openIncomeSheet);
  screenEl.querySelectorAll(".inc-del").forEach(x=> x.addEventListener("click",()=>{ if(confirm(t('delIncomeSrc'))) deleteIncome(x.dataset.id); }));
}

function openBudgetSheet(type,id){
  budgetTarget={type,id};
  const cats=(store.budgets && store.budgets.cats) || {};
  let cur=0, title="", sub="";
  if(type==='cat'){ const c=catInfo('out',id); title=catLabel(c); sub=t('monthlyLimit'); cur=cats[id]||0; }
  else if(type==='debtpay'){ title=t('monthlyPayment'); sub=t('monthlyPaymentSub'); cur=(store.settings&&store.settings.debtPayment)||0; }
  else { title=t('leftoverThisMonth'); sub=t('monthlyTargetSub'); cur=(store.budgets&&store.budgets.leftoverGoal)||0; }
  document.getElementById("budgetSheetTitle").textContent=title;
  document.getElementById("budgetSheetSub").textContent=sub;

  budgetSheetEl.classList.add("open");

function commitBudget(amt){
  store.budgets=store.budgets||{};
  if(budgetTarget.type==='cat'){
    store.budgets.cats=store.budgets.cats||{};
    if(amt>0){ store.budgets.cats[budgetTarget.id]=amt; }
    else {
      delete store.budgets.cats[budgetTarget.id];
      if(String(budgetTarget.id).startsWith('c_')) store.customCats=(store.customCats||[]).filter(c=>c.id!==budgetTarget.id);
    }
  } else if(budgetTarget.type==='debtpay'){
    store.settings=store.settings||{};
    if(amt>0) store.settings.debtPayment=amt; else delete store.settings.debtPayment;
  } else {
    if(amt>0) store.budgets.leftoverGoal=amt; else delete store.budgets.leftoverGoal;
  }
  saveStore(current,store);
  closeBudgetSheet();
  route(activeTab);
}

// --- PROFILE SELECT + PASSCODE ---
let pendingProfile=null, pcEntry="";
const profileEl=document.getElementById("profile");
const passcodeEl=document.getElementById("passcode");

let brandTimer=null;
function playBrand(){
  clearTimeout(brandTimer);
  const el=document.querySelector(".pf-title");
  const cards=document.querySelector(".pf-cards");
  const sub=document.querySelector(".pf-sub");
  const words=t('words');
  el.className="pf-title";
  cards.style.opacity="1"; sub.style.opacity="1";   // cards always available to tap
  let i=0;
  (function showWord(){
    el.textContent=words[i];
    el.classList.remove("word-out","glow");
    void el.offsetWidth;
    el.classList.add("word-in");
    if(i===words.length-1){                    // landed on "Prosper" — glow & stop
      brandTimer=setTimeout(()=>{
        el.classList.remove("word-in");
        el.classList.add("glow");
      }, 620);
      return;
    }
    brandTimer=setTimeout(()=>{                 // hold, then drift out
      el.classList.remove("word-in");
      el.classList.add("word-out");
      brandTimer=setTimeout(()=>{ i++; showWord(); }, 360);
    }, 820);
  })();
}
function showProfile(){
  clearTimeout(typeTimer);
  appEl.setAttribute("data-theme","neutral");   // reset color so it doesn't keep the last profile's theme
  welcomeEl.classList.add("hide");
  mainEl.classList.remove("show");
  passcodeEl.classList.remove("on");
  profileEl.classList.add("on");
  playBrand();
}
function commit(p){
  clearTimeout(brandTimer);
  profileEl.classList.remove("on");
  passcodeEl.classList.remove("on");
  applyProfile(p);
}
function openPasscode(p){
  clearTimeout(brandTimer);
  pcEntry="";
  document.getElementById("pcAv").textContent=PROFILES[p].name.charAt(0).toUpperCase();
  document.getElementById("pcName").textContent=PROFILES[p].name;
  buildPad(); updateDots();
  profileEl.classList.remove("on");
  passcodeEl.classList.add("on");
}
function buildPad(){
  const pad=document.getElementById("pcPad");
  const keys=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  pad.innerHTML=keys.map(k=> k===""?"<div></div>":`<button class="pc-key" data-k="${k}">${k}</button>`).join("");
  pad.querySelectorAll(".pc-key").forEach(b=> b.addEventListener("click",()=> press(b.dataset.k)));
}
function updateDots(){
  const code=PROFILES[pendingProfile].code, dots=document.getElementById("pcDots");
  dots.innerHTML="";
  for(let i=0;i<code.length;i++){ const d=document.createElement("div"); d.className="pc-dot"+(i<pcEntry.length?" fill":""); dots.appendChild(d); }
}
function press(k){
  const code=PROFILES[pendingProfile].code;
  if(k==="⌫"){ pcEntry=pcEntry.slice(0,-1); updateDots(); return; }
  if(pcEntry.length>=code.length) return;
  pcEntry+=k; updateDots();
  if(pcEntry.length===code.length){
    if(pcEntry===code){ setTimeout(()=> commit(pendingProfile),170); }
    else {
      const d=document.getElementById("pcDots"); d.classList.remove("shk"); void d.offsetWidth; d.classList.add("shk");
      setTimeout(()=>{ pcEntry=""; updateDots(); },320);
    }
  }
}
document.querySelectorAll(".pf-card").forEach(card=>{
  card.addEventListener("click",()=>{
    const p=card.dataset.profile;
    pendingProfile=p;
    appEl.setAttribute("data-theme", PROFILES[p].theme);
    if(PROFILES[p].code) openPasscode(p); else commit(p);
  });
});
document.getElementById("pcBack").addEventListener("click", showProfile);
document.getElementById("userInitial").addEventListener("click", showProfile);

// Replay the intro whenever the app actually comes into view on the profile screen,
// so it isn't "wasted" running in the background before you open it.
let lastVisible=true;
function replayBrandIfVisible(){
  if(document.visibilityState==="visible" && profileEl.classList.contains("on")) playBrand();
}
document.addEventListener("visibilitychange", ()=>{
  const vis=document.visibilityState==="visible";
  if(vis && !lastVisible) replayBrandIfVisible();
  lastVisible=vis;
});
window.addEventListener("pageshow", replayBrandIfVisible);
window.addEventListener("focus", replayBrandIfVisible);
